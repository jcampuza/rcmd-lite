name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish ARM release
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate version tag
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v<major>.<minor>.<patch>." >&2
            exit 1
          fi
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify source
        run: |
          swift format lint --recursive --strict Sources Tests Package.swift
          swift test

      - name: Package release
        env:
          RCMD_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-release.sh "${{ steps.version.outputs.value }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/RcmdLite-$VERSION-macos-arm64.zip" \
            "dist/RcmdLite-$VERSION-macos-arm64.zip.sha256" \
            --verify-tag \
            --title "RcmdLite $VERSION" \
            --generate-notes
